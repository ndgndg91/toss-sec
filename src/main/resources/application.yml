spring:
  threads:
    virtual:
      enabled: true
  application:
    name: toss-dca-trader
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/toss_trader}
    username: ${SPRING_DATASOURCE_USERNAME:giri}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

toss:
  api:
    # Bitwarden CLI로 주입할 API Key 매핑
    client-id: ${TOSS_SEC_API_KEY}
    client-secret: ${TOSS_SEC_SECRET_KEY}
    # 실거래 API URL
    base-url: https://openapi.tossinvest.com

trader:
  dca:
    # 기본 매수 설정 (개별 종목 설정이 없을 때 사용)
    default-base-amount: 10000.00
    default-max-daily-budget: 50000.00
    # 스케줄러 크론 설정
    # - 미국 주식(AAPL): 한국시간 화~토 00:00:00 실행 (0 0 0 * * TUE-SAT)
    # - 한국 주식(005930): 한국시간 월~금 15:00:00 실행 (0 0 15 * * MON-FRI)
    cron: "0 0 0 * * TUE-SAT"
    # 실제 주문을 발송하지 않고 시뮬레이션만 수행하는 옵션 (검증용)
    dry-run: true

