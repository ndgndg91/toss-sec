spring:
  threads:
    virtual:
      enabled: true
  application:
    name: toss-dca-trader
  datasource:
    # 기본 PostgreSQL 주소 (Supabase/Neon 등 SSL 연동이 필요한 경우 URL 끝에 ?sslmode=require 필수 추가)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/toss_trader}
    username: ${SPRING_DATASOURCE_USERNAME:giri}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:ndgndg91@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

toss:
  api:
    # Bitwarden CLI로 주입할 API Key 매핑 (기본값 설정하여 테스트 시 로딩 에러 방지)
    client-id: ${TOSS_SEC_API_KEY:mock-api-key}
    client-secret: ${TOSS_SEC_SECRET_KEY:mock-secret-key}
    # 실거래 API URL
    base-url: https://openapi.tossinvest.com

trader:
  dca:
    # 기본 매수 설정 (개별 종목 설정이 없을 때 사용)
    default-base-amount: 10000.00
    default-max-daily-budget: 50000.00
    # 스케줄러 크론 설정
    # - 미국 주식(AAPL): 한국시간 화~토 00:00:00 실행 (0 0 0 * * TUE-SAT)
    # - 한국 주식(005930): 한국시간 월~금 15:00:00 실행 (0 0 15 * * MON-FRI)
    cron: "0 0 0 * * TUE-SAT"
    # 실시간 시세 수집기 크론 설정 (미국 정규장 시간인 월~금 22:30 ~ 익일 05:00 동안 1분 주기 수집)
    collector-cron: "0 */1 22-23,0-4 * * MON-FRI"
    # 실제 주문을 발송하지 않고 시뮬레이션만 수행하는 옵션 (검증용)
    dry-run: true
    # 알림 및 리포트를 전송받을 이메일 주소
    notification-email: ${TRADER_NOTIFICATION_EMAIL:}
  duckdb:
    # DuckDB 로컬 시세 데이터베이스 파일 경로
    url: ${TRADER_DUCKDB_URL:jdbc:duckdb:data/market_prices.db}


